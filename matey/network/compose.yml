services:
    tailscale:
        image: tailscale/tailscale:latest
        container_name: tailscale
        hostname: matey # This will be your device name in Tailscale
        restart: unless-stopped
        security_opt:
            - no-new-privileges:true
        network_mode: host
        cap_add:
            - NET_ADMIN
            - SYS_MODULE
        volumes:
            - ./tailscale:/var/lib/tailscale
            - /dev/net/tun:/dev/net/tun
        environment:
            - TS_STATE_DIR=/var/lib/tailscale
            - TS_USERSPACE=false
            - TS_ACCEPT_DNS=true
        env_file:
            - .env

    adguard:
        container_name: adguard
        image: adguard/adguardhome:latest
        restart: unless-stopped
        security_opt:
            - no-new-privileges:true
        # Must run as root for DHCP raw socket access
        network_mode: host
        volumes:
            - ./adguard/work:/opt/adguardhome/work
            - ./adguard/conf:/opt/adguardhome/conf
        environment:
            - TZ=Europe/Paris
            - PUID=1001
            - PGID=1001
