services:
    arcane-agent:
        image: ghcr.io/getarcaneapp/arcane-headless:latest
        container_name: arcane-agent
        restart: unless-stopped
        ports:
            - "3553:3553"
        volumes:
            - ./arcane:/app/data
            - /home/max/homelab/matey:/home/max/homelab/matey:ro
        env_file:
            - .env
        environment:
            - AGENT_MODE=true
            - MANAGER_API_URL=https://docker.corsair.tf
            - TZ=Europe/Paris
            - DOCKER_HOST=tcp://socket-proxy:2375
            - PROJECTS_DIRECTORY=/home/max/homelab/matey
        networks:
            - admin

    socket-proxy:
        image: lscr.io/linuxserver/socket-proxy:latest
        container_name: socket-proxy
        environment:
            - CONTAINERS=1
            - IMAGES=1
            - PING=1
            - VERSION=1
            - NETWORKS=1
            - VOLUMES=1
            - EVENTS=1
            - POST=1
            - DELETE=1
            # Required for dashboard host info and disk usage
            - INFO=1
            - SYSTEM=1
            # Required for container updates / vulnerability scanning
            - ALLOW_START=1
            - ALLOW_STOP=1
            - ALLOW_RESTARTS=1
            # Optional: enable for terminal access
            - EXEC=1
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
        read_only: true
        tmpfs:
            - /run
        restart: unless-stopped
        networks:
            - admin

    beszel-agent:
        image: henrygd/beszel-agent:latest
        container_name: beszel-agent
        restart: unless-stopped
        network_mode: host
        security_opt:
            - no-new-privileges:true
        cap_add:
            - SYS_RAWIO # required for S.M.A.R.T. data
        devices:
            - /dev/sda:/dev/sda
        volumes:
            - ./beszel/beszel_agent_data:/var/lib/beszel-agent
            - /var/run/docker.sock:/var/run/docker.sock:ro
            - /var/run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket:ro
        env_file:
            - .env
        environment:
            SYSTEM_NAME: matey
            HUB_URL: https://status.corsair.tf

networks:
    admin:
        external: true
