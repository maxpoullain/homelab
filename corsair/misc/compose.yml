services:
  octoprint:
    container_name: octoprint
    image: octoprint/octoprint:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    devices:
      - /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0:/dev/ttyUSB0
    volumes:
      - ./octoprint:/octoprint
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.octoprint.entrypoints=https"
      - "traefik.http.routers.octoprint.rule=Host(`octoprint.corsair.tf`)"
      - "traefik.http.routers.octoprint.middlewares=private@file,security-soft@file"
      - "traefik.http.routers.octoprint.service=octoprint"
      - "traefik.http.services.octoprint.loadbalancer.server.port=80"
      - "traefik.docker.network=traefik"

  filebrowser:
    container_name: filebrowser
    image: gtstef/filebrowser:stable
    volumes:
      - /mnt/tank/users/max/filebrowser:/max # Do not use a root "/" directory or include the "/var" folder
      - ./filebrowser:/home/filebrowser/data
    user: "3000:3000"
    restart: unless-stopped
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.files.entrypoints=https"
      - "traefik.http.routers.files.rule=Host(`files.corsair.tf`)"
      - "traefik.http.routers.files.middlewares=security@file,private@file"
      - "traefik.http.routers.files.service=files"
      - "traefik.http.services.files.loadbalancer.server.port=80"
      - "traefik.docker.network=traefik"

networks:
  traefik:
    external: true
